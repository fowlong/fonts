name: Generate font index

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/font_index.yaml'
      - 'tools/font_index/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/font_index.yaml'
      - 'tools/font_index/**'

jobs:
  generate-font-index:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip fonttools brotli

      - name: Generate font index CSV
        run: |
          python tools/font_index/generate_font_index.py \
            --repo-root . \
            --output tools/font_index/font_index.csv \
            --repo-owner google \
            --repo-name fonts \
            --ref ${{ github.sha }}

      - name: Upload font index artifact
        uses: actions/upload-artifact@v4
        with:
          name: font-index-csv
          path: tools/font_index/font_index.csv
          if-no-files-found: error
