name: Generate font index

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/font_index.yaml'
      - 'generate_font_index.py'

jobs:
  generate-font-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout google/fonts (full repo with all font files)
        uses: actions/checkout@v4
        with:
          repository: google/fonts
          path: google-fonts

      - name: Checkout this repo (for the extraction script)
        uses: actions/checkout@v4
        with:
          path: self

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip fonttools brotli

      - name: Generate font index CSV
        run: |
          python self/generate_font_index.py \
            --repo-root google-fonts \
            --output font_index.csv \
            --repo-owner google \
            --repo-name fonts \
            --ref main

      - name: Upload font index artifact
        uses: actions/upload-artifact@v4
        with:
          name: font-index-csv
          path: font_index.csv
          if-no-files-found: error
